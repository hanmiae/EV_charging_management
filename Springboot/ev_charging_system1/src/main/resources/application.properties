ev.python.exe=${EV_PYTHON_EXE:C:/Users/jomg2/AppData/Local/Programs/Python/Python313/python.exe}
ev.python.script-dir=${EV_PYTHON_SCRIPT_DIR:src/main/resources/python}
ev.plate-logs.dir=${EV_PLATE_LOGS_DIR:C:/plate_logs}
