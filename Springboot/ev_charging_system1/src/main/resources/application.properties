# Default profile - profile-specific settings in application-local.properties / application-prod.properties
# Active profile is controlled by SPRING_PROFILES_ACTIVE env var (default: local)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Port - Render injects PORT env var; fall back to 8080 locally
server.port=${PORT:8080}

# PostgreSQL datasource (overridden per profile)
spring.datasource.driver-class-name=org.postgresql.Driver

## JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database=postgresql
